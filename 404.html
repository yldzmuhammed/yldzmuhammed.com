<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Muhammet YILDIZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css"/>
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;">
    <p style="font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:0.1em;margin-bottom:16px;">404</p>
    <h1 style="font-family:var(--serif);font-size:36px;color:var(--ink);margin-bottom:12px;">Page not found.</h1>
    <p style="font-family:var(--sans);font-size:15px;color:var(--ink2);margin-bottom:32px;">This page doesn't exist or was moved.</p>
    <a href="index.html" style="font-family:var(--mono);font-size:12px;background:var(--ink);color:var(--bg);padding:11px 22px;border-radius:4px;text-decoration:none;">Go home</a>
  </div>
  <script>
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme','dark');
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  </script>
</body>
</html>
